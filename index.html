<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Parcial Primer Cómputo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <header class="top-bar">
    <img src="img\logoUGB.png" alt="Logo UGB" class="logo">
    <div class="titulo">
      <strong>Parcial Primer Cómputo Ingeniería en Sistemas y</strong><br>
      <strong>Redes Informáticas</strong>
    </div>
  </header>


  <main class="contenido">
    <h1>Calculadora de Índice de Masa Corporal (IMC)</h1>
     <form id="formIMC"> <label for="peso">Peso:</label> 
       <input type="number" id="peso" placeholder="Ej: 70" required> 
       <label for="altura">Altura:</label> <input type="number" id="altura" placeholder="Ej: 1.75" step="0.01" required> 
       <label for="unidad">Unidad:</label> 
       <select id="unidad">
         <option value="metric">Kg / m</option> 
         <option value="imperial">Lb / in</option>
       </select> 
       <button type="submit">Calcular IMC</button>
     </form> 
       <resultado-imc></resultado-imc>
  </main>

  
  <footer class="bottom-bar">
    <h3><u>Integrantes del Equipo</u></h3>
    <p>Nombre Completo y Código  Nombre Completo y Código</p>
  </footer>
</body>
</html>
